apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: guestbook
  namespace: kargo-advanced
spec:
  subscriptions:
    - image:
        repoURL: ghcr.io/hiddeco/guestbook
        tagSelectionStrategy: SemVer
        allowTags: ^v?[0-9]+\.[0-9]+\.[0-9]+([\+-].*)?$
    - git:
        repoURL: https://github.com/hiddeco/kargo-advanced-3.git
        branch: main
